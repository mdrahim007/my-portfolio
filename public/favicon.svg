<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background -->
  <rect width="64" height="64" rx="14" fill="#080810"/>
  <!-- Subtle gold border -->
  <rect width="64" height="64" rx="14" fill="none" stroke="#bea98e" stroke-width="1.5" opacity="0.5"/>
  <!-- AR monogram -->
  <text
    x="32" y="44"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="28"
    font-weight="700"
    letter-spacing="-1"
    fill="url(#gold-grad)"
  >AR</text>
  <defs>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="50%" stop-color="#D4AF80"/>
      <stop offset="100%" stop-color="#FAFAFA"/>
    </linearGradient>
  </defs>
</svg>
